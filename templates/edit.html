{% extends 'base.html' %}

{% block head %}
<title>Job Tracker</title>
{% endblock %}

{% block body %}

<div class="content">
    <h1>Edit your application</h1>
    <form action="/edit/{{app.id}}" method="POST">
        <textarea name="notes" id="notes">{{app.notes}}</textarea>
        <input type="submit" value="Save">
    </form>
</div>

{% endblock %}
